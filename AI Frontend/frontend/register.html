<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Personal AI Productivity Assistant</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container-fluid vh-100">

<div class="row h-100">

<!-- Left Side -->

<div class="col-lg-6 d-none d-lg-flex flex-column justify-content-center align-items-center text-white p-5">

<h1 class="display-3 fw-bold mb-4">

🤖 Personal AI

</h1>

<h3 class="mb-4">

Create Your Smart Workspace

</h3>

<p class="lead text-center">

Manage tasks, summarize notes,
generate emails and plan your day
using Artificial Intelligence.

</p>

<img
src="https://images.unsplash.com/photo-1677442136019-21780ecad995?w=700"
class="img-fluid rounded-4 shadow-lg mt-4"
style="max-height:400px;">

</div>

<!-- Right Side -->

<div class="col-lg-6 d-flex justify-content-center align-items-center">

<div class="login-card p-5 shadow-lg" style="width:100%; max-width:520px;">

<div class="text-center mb-4">

<h2 class="fw-bold">

Create Account

</h2>

<p class="text-secondary">

Join Personal AI Productivity Assistant

</p>

</div>

<form>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

First Name

</label>

<input
type="text"
class="form-control"
placeholder="John">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Last Name

</label>

<input
type="text"
class="form-control"
placeholder="Doe">

</div>

</div>

<div class="mb-3">

<label class="form-label">

Email Address

</label>

<input
type="email"
class="form-control"
placeholder="john@example.com">

</div>

<div class="mb-3">

<label class="form-label">

Phone Number

</label>

<input
type="tel"
class="form-control"
placeholder="+91 9876543210">

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Password

</label>

<input
type="password"
class="form-control"
placeholder="********">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Confirm Password

</label>

<input
type="password"
class="form-control"
placeholder="********">

</div>

</div>
<div class="form-check mb-4">

<input
class="form-check-input"
type="checkbox"
id="terms">

<label
class="form-check-label"
for="terms">

I agree to the
<a href="#">Terms & Conditions</a>

</label>

</div>

<button
type="submit"
class="btn btn-primary w-100 py-2">

Create Account

</button>

<div class="text-center mt-4">

<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

</form>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/script.js"></script>

</body>

</html>
