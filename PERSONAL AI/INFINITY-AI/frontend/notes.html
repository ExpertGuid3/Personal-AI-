<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes | INFINITY AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="app">

    <aside class="sidebar" id="sidebar">
        <div class="brand-mini">
            <div class="logo-circle">∞</div>
            <div class="brand-mini-text">
                <h2>INFINITY</h2>
                <p>AI Productivity</p>
            </div>
        </div>

        <nav class="nav-list">
            <a href="dashboard.html" class="nav-item">
                <i class="bi bi-grid-fill"></i> Dashboard
            </a>
            <a href="chat.html" class="nav-item">
                <i class="bi bi-chat-dots-fill"></i> AI Chat
            </a>
            <a href="todo.html" class="nav-item">
                <i class="bi bi-list-check"></i> Tasks
            </a>
            <a href="notes.html" class="nav-item active">
                <i class="bi bi-journal-text"></i> Notes
            </a>
            <a href="email.html" class="nav-item">
                <i class="bi bi-envelope-fill"></i> Email Generator
            </a>
            <a href="planner.html" class="nav-item">
                <i class="bi bi-calendar-week"></i> Planner
            </a>
        </nav>

        <a href="#" class="nav-item logout" id="logoutBtn">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </aside>

    <main class="main-content">

        <header class="topbar">
            <div>
                <h1>AI Note Summarizer</h1>
                <p>Paste any long note and get a short, clear summary</p>
            </div>
            <div class="top-actions">
                <img class="profile-pic" src="https://i.pravatar.cc/120" alt="Profile">
            </div>
        </header>

        <div id="notesBanner" class="api-banner" style="display:none;"></div>

        <section class="tool-layout">

            <div class="panel">
                <div class="panel-head">
                    <h2><i class="bi bi-journal-text"></i> Your Note</h2>
                </div>
                <label class="form-label-sm">Paste the note or text you'd like summarized</label>
                <textarea id="noteInput" class="form-control-dark" placeholder="Paste your meeting notes, article, or long text here..."></textarea>
                <button class="btn-gradient" id="summarizeBtn">
                    <i class="bi bi-stars"></i> Summarize with AI
                </button>

                <div style="margin-top:18px;">
                    <label class="form-label-sm">Summary</label>
                    <div class="result-card placeholder" id="summaryResult">Your AI-generated summary will appear here.</div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-head">
                    <h2><i class="bi bi-clock-history"></i> History</h2>
                </div>
                <div class="history-list" id="notesHistory">
                    <div class="empty-hint">Your summaries will show up here.</div>
                </div>
            </div>

        </section>

    </main>
</div>

<script src="js/api.js"></script>
<script src="js/notes.js"></script>
</body>
</html>
