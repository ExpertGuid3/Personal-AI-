<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks | INFINITY AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">

        <div class="brand-mini">
            <div class="logo-circle">∞</div>
            <div class="brand-mini-text">
                <h2>INFINITY</h2>
                <p>AI Productivity</p>
            </div>
        </div>

        <nav class="nav-list">
            <a href="dashboard.html" class="nav-item">
                <i class="bi bi-grid-fill"></i> Dashboard
            </a>
            <a href="chat.html" class="nav-item">
                <i class="bi bi-chat-dots-fill"></i> AI Chat
            </a>
            <a href="todo.html" class="nav-item active">
                <i class="bi bi-list-check"></i> Tasks
            </a>
            <a href="notes.html" class="nav-item">
                <i class="bi bi-journal-text"></i> Notes
            </a>
            <a href="email.html" class="nav-item">
                <i class="bi bi-envelope-fill"></i> Email Generator
            </a>
            <a href="planner.html" class="nav-item">
                <i class="bi bi-calendar-week"></i> Planner
            </a>
        </nav>

        <a href="#" class="nav-item logout" id="logoutBtn">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>

    </aside>

    <!-- Main -->
    <main class="main-content">

        <header class="topbar">
            <div>
                <h1>To-Do Manager</h1>
                <p>Add, edit, and track your daily tasks</p>
            </div>
            <div class="top-actions">
                <img class="profile-pic" src="https://i.pravatar.cc/120" alt="Profile">
            </div>
        </header>

        <section class="panel">
            <div class="panel-head">
                <h2><i class="bi bi-plus-circle"></i> Add a Task</h2>
            </div>

            <div id="todoBanner" class="api-banner" style="display:none;"></div>

            <div class="add-task-bar">
                <input type="text" id="taskInput" class="form-control-dark" placeholder="e.g. Finish the frontend deck" style="margin-bottom:0;">
                <select id="taskPriority" class="form-control-dark" style="margin-bottom:0;">
                    <option value="low">Low</option>
                    <option value="normal" selected>Normal</option>
                    <option value="high">High</option>
                </select>
                <button class="btn-gradient" id="addTaskBtn"><i class="bi bi-plus-lg"></i> Add</button>
            </div>
        </section>

        <section class="panel" style="margin-top:20px;">
            <div class="panel-head">
                <h2><i class="bi bi-list-check"></i> Your Tasks</h2>
            </div>
            <div id="taskList"></div>
        </section>

    </main>
</div>

<script src="js/api.js"></script>
<script src="js/todo.js"></script>
</body>
</html>
